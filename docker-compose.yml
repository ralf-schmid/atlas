services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: atlas
      # Default bleibt "atlas" (kompatibel mit bestehendem Volume auf der UGREEN);
      # fuer einen Passwortwechsel POSTGRES_PASSWORD in .env setzen UND das
      # DB-Passwort im laufenden Cluster per ALTER ROLE anpassen.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas}
      POSTGRES_DB: atlas
    ports:
      # Auf der UGREEN via ATLAS_BIND_IP=192.168.178.116 (.env) an das LAN-Interface
      # gebunden — erreichbar im 192.168.178.0/24, aber nicht auf anderen Interfaces.
      - "${ATLAS_BIND_IP:-0.0.0.0}:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    # LiteLLM v1.92.0 — per Digest gepinnt (2026-07-05), weil main-latest ein mutable
    # Dev-Tag ist. Update: neuen Digest eintragen + Deployment verifizieren.
    image: ghcr.io/berriai/litellm:main-latest@sha256:10264d97c2e80a664c02688b7015b3909dff024764c76aef676a6bd495ca136a
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    volumes:
      - ./config/litellm_proxy_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "${ATLAS_BIND_IP:-0.0.0.0}:4000:4000"
    healthcheck:
      # python statt curl: das Chainguard-basierte LiteLLM-Image enthaelt kein curl,
      # der alte Check war dauerhaft "unhealthy" obwohl der Dienst antwortete.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://atlas:${POSTGRES_PASSWORD:-atlas}@postgres:5432/atlas
      # F013: publications mail-trigger webhook (src/api/routes_ingestion.py) needs
      # the Telegram alert config + its own shared webhook secret + the fallback
      # PDF ingest path (used only for the Telegram message text, not filesystem
      # access from within this container).
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      N8N_PUBLICATIONS_WEBHOOK_SECRET: ${N8N_PUBLICATIONS_WEBHOOK_SECRET}
      PUBLICATIONS_INGEST_DIR: ${PUBLICATIONS_INGEST_DIR}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Gleiche Interface-Bindung wie postgres/litellm: die API hat bewusst keine
      # Auth-Schicht (F007) — sie darf nur im LAN erreichbar sein.
      - "${ATLAS_BIND_IP:-0.0.0.0}:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
    restart: unless-stopped
    environment:
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      # Host port 3001, not 3000 — 3000 is taken by the existing Grafana instance
      # on the UGREEN (ARCHITECTURE.md "Grafana: bestehende Instanz").
      - "${ATLAS_BIND_IP:-0.0.0.0}:3001:3000"

volumes:
  postgres-data:
