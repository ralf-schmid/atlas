# Zyklus-Zeiten, ARCHITECTURE.md §5.2. Aenderung hier wirkt ohne Deploy (einzelne
# Zyklen abschaltbar -- Betriebs-Fallback, kein Plan).

stock:
  timezone: America/New_York
  cycles:
    - seq: 1
      time: "09:00"
      active: true
    - seq: 2
      time: "10:30"
      active: true
    - seq: 3
      time: "13:00"
      active: true
    - seq: 4
      time: "15:15"
      active: true

crypto:
  timezone: UTC
  weekday_times: ["00:00", "06:00", "12:00", "18:00"]
  weekend_times: ["06:00", "18:00"]

# F070: taeglicher Telegram-Digest (ARCHITECTURE.md §6.4 Punkt 3). 16:30 ET, nach
# dem letzten Aktien-Zyklus C4 (15:15 ET) inkl. Puffer fuer Fill/Snapshot-Reporting
# -- "taeglich nach US-Close" (ARCHITECTURE.md §5.2). Feuert jeden Tag, nicht nur
# werktags (CRYPTOR handelt auch am Wochenende, config/cycles.yaml crypto oben).
digest:
  time: "16:30"
