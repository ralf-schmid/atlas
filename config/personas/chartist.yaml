# CHARTIST — Der Techniker, ARCHITECTURE.md §4.4

name: CHARTIST
charter_version: 1
model: claude-sonnet-5

max_position_pct: 0.10
max_trades_per_day: 8
max_open_positions: 15
min_cash_pct: 0.0

stop_loss_policy:
  type: atr
  atr_multiplier: 2.0
  min_loss_pct: 0.08   # "mindestens -8%" — Untergrenze der Stop-Distanz, siehe F004 §2

order_types_allowed: [market, stop]

universe_screen:
  daily_volume_min: 1000000
  price_min: 10
