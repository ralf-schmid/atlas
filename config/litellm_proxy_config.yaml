# Config fuer den LiteLLM-Proxy-Prozess selbst (nicht zu verwechseln mit config/llm.yaml,
# das unser eigenes Rollen-Routing beschreibt). Format: https://docs.litellm.ai/docs/proxy/configs
# Keys kommen ausschliesslich aus Environment-Variablen (Invariante 6).

model_list:
  - model_name: claude-sonnet-5
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-haiku-4-5-groq
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
