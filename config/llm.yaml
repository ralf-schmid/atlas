# LiteLLM-Routing + Kosten-Caps, ARCHITECTURE.md §3.3/§5.1/§6.3.
# Getrennte LiteLLM-Keys je Agent-Rolle x Persona werden im LiteLLM-Proxy selbst verwaltet
# (virtuelle Keys, nicht hier) - diese Datei beschreibt nur Routing + die Orchestrator-
# seitigen Caps (Ebene 2 der doppelten Kosten-Bremse, Invariante 7).

base_url: http://localhost:4000

caps:
  system_daily_usd: 5.0
  persona_daily_usd: 1.0
  monthly_soft_cap_usd: 120.0
  monthly_soft_cap_warn_pct: 0.8

roles:
  market_research:
    model: claude-haiku-4-5
    provider: anthropic
    shared: true
    prompt_caching: true
  # Haiku fuer Recherche (CLAUDE.md); Groq bleibt Experiment-Slot fuer P7 (GUARDIAN-A/B).
  # provider muss zum Proxy-Routing passen: claude-haiku-4-5 -> anthropic; der Groq-Slot
  # heisst im Proxy claude-haiku-4-5-groq (config/litellm_proxy_config.yaml).
  news_research:
    model: claude-haiku-4-5
    provider: anthropic
    shared: true
    prompt_caching: true
  # TEMPORAER auf den Groq-Slot umgestellt (09.07.2026, Ralfs Anweisung): das
  # Anthropic-Konto hinter dem Proxy hat kein Guthaben mehr, jeder Zyklus scheiterte
  # seit 00:00 UTC mit 400 "credit balance too low". Gilt uniform fuer alle 6
  # Personas (Fairness-Invariante #10 unberuehrt). Rollback nach Aufladung:
  # model wieder claude-sonnet-5, provider anthropic.
  persona_analysis:
    model: claude-haiku-4-5-groq
    provider: groq
    shared: false
    prompt_caching: true
  trading:
    model: claude-haiku-4-5
    provider: anthropic
    shared: false
    prompt_caching: false
  review:
    model: claude-sonnet-5
    provider: anthropic
    shared: true
    prompt_caching: true
