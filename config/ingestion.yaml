# Ingestion-Jobs, siehe docs/features/F008-marktdaten-sync.md.
# Keys kommen ausschliesslich aus Environment-Variablen (Invariante 6), nie aus dieser Datei.

market_data:
  key_id_env: ALPACA_MARKET_DATA_KEY_ID
  secret_key_env: ALPACA_MARKET_DATA_SECRET_KEY
  # F066: die P3-Seed-Liste (nur AAPL/MSFT/SPY) blockierte CHARTIST strukturell —
  # resolve_symbol_universe() (F035) vereinigt diese Liste mit offenen Positionen
  # und VULTUREs Screener-Kandidaten (die per Charter/Config hart auf price < 5$
  # gefiltert sind, config/ingestion.yaml vulture_screener.max_price), sodass fuer
  # CHARTISTs Universumskriterium (price > 10$, config/personas/chartist.yaml
  # universe_screen) faktisch nur AAPL uebrig blieb. Diese 16-Namen-Liste war
  # F066s ERSTER Fix (handverlesener Large-Cap-Korb) — reicht allein weiterhin
  # nicht fuer "mindestens 100 moegliche Werte" (Ralfs Auftrag, F069). Die
  # eigentliche Breite kommt seit F068/F069 aus der taeglichen
  # aktienfinder-Screener-Discovery (aktienfinder.screener_discovery unten,
  # ~250 Zielkandidaten, live verifiziert 128+ davon mit echtem Alpaca-USD-Kurs
  # > 10$, siehe F069 §5) — resolve_symbol_universe() vereinigt beide Quellen,
  # diese 16 sind nur noch ein minimaler, redundanzfreier Zusatz-Seed
  # (bekannte Index-Anker), nicht mehr "die" CHARTIST-Basis. Hinweis: der
  # Alpaca-Marktdaten-Key hat nur IEX-Feed-Entitlement (kein SIP, siehe
  # market_data_sync.py) - IEX bildet nur einen Teil des konsolidierten
  # Handelsvolumens ab, das gemessene Volumen liegt daher strukturell unter dem
  # tatsaechlichen Markt-Gesamtvolumen (gleicher Vorbehalt wie bei
  # vulture_screener.min_volume: Datenqualitaets-, kein Verbotsfilter).
  watchlist:
    - AAPL
    - MSFT
    - SPY
    - GOOGL
    - AMZN
    - NVDA
    - META
    - JPM
    - HD
    - DIS
    - KO
    - XOM
    - QQQ
    - IWM
    - TSLA
    - JNJ
  # F048: technisches Indikatoren brauchen 15-90 Tages-Bars Historie je Symbol
  # (src/orchestrator/indicators.py) - ein reiner 1-Tages-Sync akkumuliert das nie.
  # Rollierendes Fenster statt Einzeltag, idempotent (Upsert), damit auch ein
  # ausgefallener Tag (Container-Restart, Ausfall) automatisch nachgeholt wird.
  lookback_days: 90

crypto_market_data:
  # F064: CRYPTORs Charter verspricht "Momentum/Trend (code-berechnet)" fuer
  # BTC/ETH/SOL — bis hierhin gab es dafuer keine OHLCV-Quelle (nur die
  # BTC-Dominanz als Regime-Filter, siehe coingecko unten). Gleicher
  # Paper-Market-Data-Key wie market_data, kein separates Krypto-Entitlement
  # noetig (live verifiziert). Eigene Sektion statt Erweiterung von
  # market_data.watchlist, weil der Stock-Sync-Job (AlpacaBarsProvider,
  # StockHistoricalDataClient) fuer Krypto-Symbole fehlschlagen wuerde — ein
  # eigener Provider (src/ingestion/crypto_market_data_sync.py) braucht einen
  # eigenen Watchlist-Eintrag. research_synthesis.py vereinigt beide Listen vor
  # resolve_symbol_universe, damit technische Indikatoren fuer Krypto genau wie
  # fuer Aktien generisch berechnet werden (F036 ist bereits symbol-agnostisch).
  key_id_env: ALPACA_MARKET_DATA_KEY_ID
  secret_key_env: ALPACA_MARKET_DATA_SECRET_KEY
  watchlist:
    - BTC/USD
    - ETH/USD
    - SOL/USD
  lookback_days: 90

edgar:
  # Kostenlos, offiziell (sec.gov), siehe ARCHITECTURE.md §3.5.3. SEC verlangt einen
  # aussagekraeftigen User-Agent (Name + Kontakt) fuer automatisierte Zugriffe, siehe
  # https://www.sec.gov/os/webmaster-faq#developers — echte Kontaktdaten kommen aus
  # der Env-Var, nicht aus dieser Datei.
  feed_url: "https://www.sec.gov/cgi-bin/browse-edgar?action=getcurrent&company=&dateb=&owner=include&count=100&output=atom"
  user_agent_env: EDGAR_USER_AGENT
  # F044: ungefiltert (type= leer) war das die komplette SEC-Firehose — 424B/FWP
  # (Struktur-Produkte grosser Banken), N-CSRS/N-PX/497* (Fonds-Pflichtberichte),
  # 13F-HR (Institutionelle) machten >60% der Zeilen aus und verwaesserten den
  # Research-Pool (live gemessen: 1257 Filings gesamt, nur 451 in dieser Liste,
  # siehe docs/features/F044). Liste = genau VULTUREs Charter-Signale
  # ("EDGAR-Filings (8-K, Insider-Käufe)", config/personas/vulture.yaml via
  # src/personas/charters.py) plus Beteiligungsmeldungen.
  form_types:
    - "8-K"
    - "3"
    - "4"
    - "4/A"
    - "144"
    - "SC 13D"
    - "SC 13G"

vulture_screener:
  # Universum = komplettes Alpaca-Asset-Verzeichnis (kein Whitelisting), siehe
  # ARCHITECTURE.md §3.5.3. min_volume ist ein Datenqualitaets-, kein Verbotsfilter.
  key_id_env: ALPACA_MARKET_DATA_KEY_ID
  secret_key_env: ALPACA_MARKET_DATA_SECRET_KEY
  max_price: 5.0
  min_volume: 100000

aktienfinder:
  # Login gegen aktienfinder.net (ARCHITECTURE.md nennt "aktienfinder.de", die
  # tatsaechliche Domain ist aktienfinder.net). Selektoren live gegen die echte,
  # eingeloggte Seite verifiziert (Apple + SAP, siehe F012 §5) — Playwrights
  # erweitertes CSS (:has-text, :nth-match) statt fragiler DOM-Positions-Annahmen.
  # Symbole werden hier als ISIN adressiert (aktienfinder.net-URL-Schema), nicht als
  # Ticker. dividend_history kommt separat von der /dividenden-profil/<isin>-Tabelle
  # (extract_dividend_history), nicht ueber field_selectors (keine Einzelwert-Zelle).
  username_env: AKTIENFINDER_USERNAME
  password_env: AKTIENFINDER_PASSWORD
  screenshot_dir_env: AKTIENFINDER_SCREENSHOT_DIR
  # GUARDIANs urspruengliche Kandidatenliste (F037) — bewusst statisch, Ralf
  # pflegt sie manuell. F037s Begruendung ("kein Fundamental-Screener ohne
  # kostenpflichtigen Datenanbieter") ist seit F068 ueberholt (Ralf hat ein
  # kostenpflichtiges aktienfinder-Abo) — der echte Screener laeuft jetzt
  # zusaetzlich ueber `screener_discovery` unten. Diese 6er-Liste bleibt fuer
  # den tieferen Profilseiten-Grab (Dividenden-Historie, Screenshot-Beleg)
  # bestehen, siehe docs/features/F068-aktienfinder-screener-discovery.md §2.
  candidate_isins:
    - DE0007164600 # SAP
    - US0378331005 # Apple
    - US5949181045 # Microsoft
    - DE0008430026 # Munich Re
    - US4781601046 # Johnson & Johnson
    - US7427181091 # Procter & Gamble
  # F067: aktienfinders Preisziel-/Qualitäts-Scores existierten bisher nur als
  # isolierte Snapshot-Research-Items, ohne dass fuer dieselben Unternehmen je
  # market_bar-Preisdaten gesynct wurden (get_latest_price lieferte None, ein
  # Kauf waere nie sizebar gewesen). Diese Zuordnung speist
  # resolve_stock_seed_watchlist (src/orchestrator/symbol_universe.py), die
  # sowohl den taeglichen Markt-Bar-Sync als auch die technische-Indikator-
  # Berechnung mit denselben Tickern versorgt. Nur ISINs mit echtem, live
  # bestaetigtem Alpaca-Handelsplatz UND tatsaechlichen Kursdaten sind hier
  # aufgenommen — SAP ist trotz DE-ISIN als NYSE-ADR handelbar (live
  # bestaetigt), Munich Re dagegen nur als duenn gehandeltes OTC-Papier
  # (MURGY) ohne verwertbare Kursdaten im IEX-Feed und bleibt daher hier
  # bewusst aussen vor (weiterhin nur als Snapshot-Research-Item vertreten).
  ticker_by_isin:
    DE0007164600: SAP # SAP — NYSE-ADR, live bestaetigt (F067)
    US0378331005: AAPL # Apple
    US5949181045: MSFT # Microsoft
    US4781601046: JNJ # Johnson & Johnson
    US7427181091: PG # Procter & Gamble
    # DE0008430026 (Munich Re): kein liquide handelbarer Alpaca-Ticker,
    # bewusst nicht gemappt (siehe Kommentar oben).
  field_selectors:
    price: "li.stockprofile-tiles__list-item:has-text('Aktienkurs') span:not(.stockprofile-tiles__fixed-width-span)"
    isin: "li.stockprofile-tiles__list-item:has-text('ISIN') span:not(.stockprofile-tiles__fixed-width-span)"
    dividend_yield: "li.stockprofile-tiles__list-item:has-text('Dividendenrendite') >> a"
    quality_score_dividend_yield: ":nth-match(.scorecard-tile-layout__current-score, 1)"
    quality_score_dividend_growth: ":nth-match(.scorecard-tile-layout__current-score, 2)"
    quality_score_earnings_growth: ":nth-match(.scorecard-tile-layout__current-score, 3)"
  # F043: Kursziel/Stabilitaet-Kriterien existieren NICHT als einfache Felder auf der
  # Profil-Seite (live mit echtem Login geprueft) — nur als Spalten im separaten
  # Screener-Tool (/aktienfinder, DataTables-Grid). Werte-Namen -> exakte
  # Spalten-Ueberschrift, per ISIN-Suche + Header-Text-Match ausgelesen (kein fester
  # Spalten-Index, siehe extract_screener_row), robust gegen Spalten-Umsortierung.
  # F068: field_labels fuer BEIDE Screener-Interaktionen — die per-ISIN-Suche
  # (extract_screener_row, F043) UND die neue paginierte Grid-Discovery
  # (aktienfinder_screener.py) lesen dieselbe Spalten-Zuordnung, ein Header-Text
  # -> ein friendly name. price/dividend_yield/quality_score_dividend_stability/
  # pe_ratio neu (F068) — direkt aus der Grid-Spaltenliste live geprueft
  # (67 Spalten, siehe F068 §5), keine geratenen Header-Texte.
  screener_fields:
    price: "Kurs"
    dividend_yield: "Dividende Rendite"
    price_target: "Kursziel"
    price_target_upside_pct: "Kursziel Rendite"
    quality_score_dividend_stability: "Stabilität Dividende"
    quality_score_earnings_stability: "Stabilität Gewinn"
    quality_score_cashflow_stability: "Stabilität CashFlow"
    pe_ratio: "KGV Ber."
  # F068: dynamische Kandidaten-Discovery ueber das Screener-Tool-Grid
  # (/aktienfinder, ~7800 getrackte Werte auf 78 Seiten a 100, live geprueft
  # 2026-07-11) statt der 6er-Liste oben — reversiert F037s "kein
  # Fundamental-Screener"-Entscheidung, siehe
  # docs/adr/0006-aktienfinder-screener-instead-of-static-list.md.
  # target_candidates/max_pages sind bewusst konfigurierbar, nicht hart codiert
  # ("eigentlich moechte ich gar keine Einschraenkung" — Ralf kann beides ohne
  # Code-Aenderung hochsetzen). "Nordamerika" ist nur ein Vorfilter (weniger
  # Seiten zu scrapen); die eigentliche Freigabe ist Alpacas echtes
  # Tradable-Asset-Verzeichnis (aktienfinder_screener.py, gleiches Prinzip wie
  # F067 "nicht annehmen, live pruefen").
  # F069: 150 lieferte live 164 Kandidaten, davon 128 mit echtem Alpaca-USD-
  # Kurs > 10 $ (CHARTISTs Universumskriterium) — bereits deutlich ueber
  # Ralfs Mindestanforderung von 100. target_candidates auf 250 angehoben
  # (Marge fuer Tagesschwankungen bei Kurs/Handelbarkeit), weiterhin nur
  # 2-3 Grid-Seiten von 78 verfuegbaren, siehe F069 §5.
  screener_discovery:
    target_candidates: 250
    max_pages: 10
    regions:
      - "Nordamerika"

aktienfinder_blog:
  # F041: oeffentliche Blog-/Analyse-/Empfehlungs-Archivseiten, kein Login, kein
  # Playwright — reine HTTP-GET + Regex-Parsing der Elementor-Artikelkarten
  # (Titel/Datum/Kategorie/Tags/Premium-Flag), niemals der Premium-Volltext.
  # Nur Seite 1 je URL (reicht fuer taegliche Deltas, kein Backfill).
  urls:
    - "https://aktienfinder.net/blog/"
    - "https://aktienfinder.net/blog/aktienanalyse/"
    - "https://aktienfinder.net/blog/kaufenswerte-aktien/"

market_news:
  # F058: Ralfs Auftrag war reuters.com/markets/us/ als Analystenquelle — dessen
  # robots.txt blockt jeden nicht gelisteten Bot komplett (`User-agent: * /
  # Disallow: /`), ein direkter Abruf liefert sogar HTTP 401 (CloudFront-
  # Bot-Schutz, keine reine Konvention). Nach Ralfs Entscheidung (2026-07-10)
  # stattdessen Yahoo Finance's oeffentliches Top-Stories-RSS: kein Login, per
  # robots.txt erlaubt, syndiziert echte Reuters-Artikel (`source`) sowie
  # Analysten-Kursziel-/Rating-Meldungen (Argus Research, Evercore, RBC, ...).
  feed_url: "https://finance.yahoo.com/news/rssindex"

schedule:
  # Siehe docs/features/F035-ingestion-scheduler-activation.md. America/New_York
  # fuer die aktienbezogenen Jobs (Screener vor Markt-Bar-Sync, beide vor dem
  # ersten Aktien-Zyklus C1 09:00 ET, config/cycles.yaml) — EDGAR braucht keine
  # Boersenzeit, laeuft per Intervall.
  timezone: America/New_York
  edgar_rss:
    interval_minutes: 30
  vulture_screener:
    time: "06:00"
  aktienfinder_screener_discovery:
    # F068: vor market_data_sync (06:30), damit dessen resolve_symbol_universe
    # noch am selben Tag die frisch entdeckten Ticker sieht.
    time: "06:15"
  market_data_sync:
    time: "06:30"
  crypto_market_data_sync:
    # F064: kein Boersenschluss (CRYPTOR handelt 24/7, config/cycles.yaml
    # crypto.weekday_times/weekend_times), daher Intervall statt fixer
    # ET-Zeit — vor jedem der 4 taeglichen Krypto-Zyklen (00/06/12/18 UTC)
    # mindestens einmal frisch synct.
    interval_minutes: 60
  aktienfinder:
    time: "07:00"
  coingecko:
    interval_minutes: 60
  reddit:
    interval_minutes: 60
    # F039: REDDIT_CLIENT_ID/_SECRET/_USER_AGENT sind noch nicht in der Box-.env
    # hinterlegt (docs/deployment.md) — Job schlug jeden Lauf fehl und loeste
    # wiederholte Telegram-Fehlalarme aus. Abgeschaltet, bis Ralf die Reddit-
    # "script"-App registriert und die Werte eintraegt.
    enabled: false
  aktienfinder_blog:
    time: "05:30"
  market_news:
    interval_minutes: 30

publications:
  # Fallback-first (ARCHITECTURE.md §3.5.1): n8n erkennt die Benachrichtigungs-Mail
  # (Absender/Betreff, siehe F013), ruft den ATLAS-Webhook auf, der Ralf per Telegram
  # zum manuellen Ablegen der PDF auffordert. Auto-Download via Playwright reift
  # spaeter nach. base_dir_env muss mit F011s Verzeichnis-Konvention
  # (<base_dir>/<slug>/<YYYY-MM-DD>.pdf) uebereinstimmen.
  base_dir_env: PUBLICATIONS_INGEST_DIR
  webhook_secret_env: N8N_PUBLICATIONS_WEBHOOK_SECRET
  magazines:
    - slug: euro_am_sonntag
      subject_keyword: "Euro am Sonntag"
      overview_url: "https://konto.boersenmedien.com/produkte/abonnements/2778324/A-10529198/ausgaben"
    - slug: boerse_online
      subject_keyword: "BÖRSE ONLINE"
      overview_url: "https://konto.boersenmedien.com/produkte/abonnements/2778326/A-10510298/ausgaben"
    - slug: der_aktionaer
      subject_keyword: "DER AKTIONÄR"
      overview_url: "https://konto.boersenmedien.com/produkte/abonnements/2778322/A-10510232/ausgaben"

coingecko:
  # Kostenlos, kein Auth (F040) — Krypto-Marktregime-Signal (BTC-Dominanz) fuer
  # CRYPTOR.
  base_url: "https://api.coingecko.com/api/v3/global"

reddit:
  # OAuth2 App-only (client_credentials, F039) — CRYPTORs Krypto-Sentiment-Quelle.
  # Ralf muss einmalig eine "script"-App unter reddit.com/prefs/apps registrieren.
  # Keine Sentiment-Berechnung im Code — nur rohe Fakten, siehe reddit_sentiment.py.
  client_id_env: REDDIT_CLIENT_ID
  client_secret_env: REDDIT_CLIENT_SECRET
  user_agent_env: REDDIT_USER_AGENT
  subreddits:
    - CryptoCurrency
    - Bitcoin
    - ethereum
  limit_per_subreddit: 25
